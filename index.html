<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>小动物画画监督日历</title>
<style>
  :root {
    --bg1:#151018; --bg2:#211827;
    --panel:rgba(36,27,41,.92);
    --panel2:rgba(255,255,255,.06);
    --text:#fff7fb;
    --muted:#cbb8c8;
    --line:rgba(255,255,255,.12);
    --accent:#ff83bd;
    --accent2:#ffc3df;
    --good:#98d4bb;
    --danger:#ff6688;
    --shadow:rgba(0,0,0,.28);
  }

  body.theme-cream {
    --bg1:#fff7ec; --bg2:#ffe6cf;
    --panel:rgba(255,250,242,.92);
    --panel2:rgba(245,163,92,.12);
    --text:#4a3124;
    --muted:#8a6755;
    --line:rgba(130,78,45,.16);
    --accent:#f5a35c;
    --accent2:#d66f7f;
    --good:#75b79e;
    --danger:#d66f7f;
    --shadow:rgba(122,72,35,.16);
  }

  body.theme-mint {
    --bg1:#eafaf4; --bg2:#d7eef5;
    --panel:rgba(249,255,252,.9);
    --panel2:rgba(120,190,170,.14);
    --text:#1d3b38;
    --muted:#5c7d78;
    --line:rgba(35,90,80,.14);
    --accent:#68c7b0;
    --accent2:#6aa8d8;
    --good:#68c7b0;
    --danger:#e07a8f;
    --shadow:rgba(35,90,80,.14);
  }

  body.theme-blue {
    --bg1:#0d1324; --bg2:#18243c;
    --panel:rgba(22,31,52,.92);
    --panel2:rgba(255,255,255,.06);
    --text:#f3f7ff;
    --muted:#aebbd4;
    --line:rgba(255,255,255,.12);
    --accent:#87a8ff;
    --accent2:#c6d4ff;
    --good:#8bd6c6;
    --danger:#ff7892;
    --shadow:rgba(0,0,0,.32);
  }

  body.theme-sakura {
    --bg1:#fff0f5; --bg2:#ffe3ec;
    --panel:rgba(255,250,252,.92);
    --panel2:rgba(255,150,185,.12);
    --text:#4a2d37;
    --muted:#8f6674;
    --line:rgba(130,55,78,.15);
    --accent:#ff8fb8;
    --accent2:#c48a72;
    --good:#8cc9aa;
    --danger:#e66c87;
    --shadow:rgba(130,55,78,.14);
  }

  * { box-sizing:border-box; }

  body {
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 32%),
      radial-gradient(circle at 80% 10%, color-mix(in srgb, var(--accent2) 20%, transparent), transparent 34%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;
    display:flex;
    justify-content:center;
    padding:18px;
  }

  .app {
    width:min(820px,100%);
    display:grid;
    gap:14px;
  }

  .card {
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 20px 70px var(--shadow);
    overflow:hidden;
    backdrop-filter: blur(10px);
  }

  header.card {
    padding:18px;
    display:flex;
    align-items:center;
    gap:14px;
  }

  .avatar {
    width:62px;
    height:62px;
    border-radius:24px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;
    place-items:center;
    font-size:34px;
    box-shadow:0 10px 30px color-mix(in srgb, var(--accent) 35%, transparent);
    flex:0 0 auto;
  }

  h1 { margin:0; font-size:22px; }

  .sub {
    margin-top:5px;
    color:var(--muted);
    font-size:13px;
    line-height:1.45;
  }

  .section {
    padding:14px;
    display:grid;
    gap:12px;
  }

  .controlBlock { display:grid; gap:7px; }

  .label {
    color:var(--muted);
    font-size:12px;
  }

  .row2 {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .row3 {
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:8px;
  }

  .pillRow {
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
  }

  .pillRow::-webkit-scrollbar { display:none; }

  button {
    border:1px solid var(--line);
    background:var(--panel2);
    color:var(--text);
    border-radius:14px;
    padding:9px 12px;
    font-size:14px;
    cursor:pointer;
    transition:transform .12s ease,opacity .12s ease,background .12s ease;
    white-space:nowrap;
  }

  button:active { transform:scale(.96); opacity:.82; }

  button.active {
    border-color:color-mix(in srgb, var(--accent) 65%, transparent);
    background:color-mix(in srgb, var(--accent) 24%, transparent);
  }

  .primary {
    border-color:color-mix(in srgb, var(--accent) 55%, transparent);
    background:linear-gradient(135deg,
      color-mix(in srgb, var(--accent) 38%, transparent),
      color-mix(in srgb, var(--accent2) 24%, transparent)
    );
    font-weight:700;
  }

  .good {
    border-color:color-mix(in srgb, var(--good) 55%, transparent);
    background:color-mix(in srgb, var(--good) 18%, transparent);
  }

  .danger {
    border-color:color-mix(in srgb, var(--danger) 55%, transparent);
    background:color-mix(in srgb, var(--danger) 16%, transparent);
  }

  .stats {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:14px;
  }

  .stat {
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    text-align:center;
  }

  .stat b {
    display:block;
    font-size:24px;
    color:var(--accent2);
  }

  .stat span { color:var(--muted); font-size:12px; }

  .toolbar {
    padding:14px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    border-top:1px solid var(--line);
  }

  .monthTitle { font-weight:700; font-size:17px; }

  .calendar { padding:0 14px 16px; }

  .week, .grid {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:7px;
  }

  .week { margin-bottom:7px; }

  .weekday {
    text-align:center;
    color:var(--muted);
    font-size:12px;
    padding:6px 0;
  }

  .day {
    min-height:82px;
    border-radius:18px;
    padding:8px;
    background:color-mix(in srgb, var(--panel2) 80%, transparent);
    border:1px solid color-mix(in srgb, var(--line) 80%, transparent);
    cursor:pointer;
    overflow:hidden;
  }

  .day:hover { border-color:color-mix(in srgb, var(--accent) 42%, transparent); }
  .day.other { opacity:.34; }

  .day.today {
    border-color:color-mix(in srgb, var(--accent) 70%, transparent);
    box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--accent) 22%, transparent);
  }

  .day.selected { outline:2px solid color-mix(in srgb, var(--accent2) 70%, transparent); }

  .num { font-size:13px; color:var(--muted); }
  .mark { margin-top:8px; font-size:24px; line-height:1; }

  .tags {
    display:flex;
    flex-wrap:wrap;
    gap:3px;
    margin-top:7px;
  }

  .tag {
    font-size:10px;
    color:var(--text);
    background:color-mix(in srgb, var(--accent) 22%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    padding:2px 5px;
    border-radius:999px;
  }

  .panelTitle {
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
  }

  .panelTitle b { font-size:16px; }
  .panelTitle span { color:var(--muted); font-size:12px; }

  textarea, input[type="text"] {
    width:100%;
    background:color-mix(in srgb, var(--panel2) 70%, rgba(0,0,0,.14));
    border:1px solid var(--line);
    color:var(--text);
    border-radius:16px;
    padding:11px 12px;
    outline:none;
    font-family:inherit;
    font-size:14px;
  }

  textarea {
    min-height:86px;
    resize:vertical;
  }

  textarea::placeholder, input::placeholder {
    color:color-mix(in srgb, var(--muted) 78%, transparent);
  }

  .actions {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .footer {
    padding:14px 16px;
    color:var(--muted);
    font-size:12px;
    line-height:1.6;
    border-top:1px solid var(--line);
  }

  .toast {
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    background:rgba(20,16,24,.95);
    border:1px solid rgba(255,255,255,.16);
    padding:10px 14px;
    border-radius:999px;
    color:#fff;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease,bottom .2s ease;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
  }

  .toast.show { opacity:1; bottom:28px; }

  input[type=file] { display:none; }

  @media (max-width:560px) {
    body { padding:10px; }
    header.card { align-items:flex-start; }
    .row2, .row3 { grid-template-columns:1fr; }
    .stats { gap:7px; padding:10px; }
    .stat { padding:9px 6px; border-radius:15px; }
    .stat b { font-size:20px; }
    .toolbar { padding:10px; }
    .calendar { padding:0 10px 12px; }
    .day { min-height:68px; border-radius:14px; padding:6px; }
    .mark { font-size:20px; margin-top:5px; }
    .tag { display:none; }
  }
</style>
</head>

<body>
<main class="app">
  <header class="card">
    <div class="avatar" id="avatarBox">🦊</div>
    <div>
      <h1>小动物画画监督日历</h1>
      <div class="sub" id="subtitle">
        今日监督员：小狐狸。打开绘画软件就算一次有效开始。
      </div>
    </div>
  </header>

  <section class="card section">
    <div class="controlBlock">
      <div class="label">称呼设置</div>
      <div class="row2">
        <input id="userName" type="text" placeholder="User 称呼，例如：User / 猫猫 / 小画师" />
        <input id="charName" type="text" placeholder="Char 称呼，例如：Char / 老公 / 监督员" />
      </div>
    </div>

    <div class="controlBlock">
      <div class="label">主题颜色</div>
      <div class="pillRow" id="themeRow"></div>
    </div>

    <div class="controlBlock">
      <div class="label">今日监督员</div>
      <div class="pillRow" id="animalRow"></div>
    </div>

    <div class="controlBlock">
      <div class="label">自定义监督员</div>
      <div class="row3">
        <input id="customAnimalIcon" type="text" placeholder="emoji，例如：🦭" />
        <input id="customAnimalName" type="text" placeholder="名字，例如：小海豹" />
        <button id="addAnimal">添加</button>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="stats">
      <div class="stat">
        <b id="streak">0</b>
        <span>连续打卡</span>
      </div>
      <div class="stat">
        <b id="monthCount">0</b>
        <span>本月打卡</span>
      </div>
      <div class="stat">
        <b id="totalCount">0</b>
        <span>总打卡</span>
      </div>
    </div>

    <div class="toolbar">
      <button id="prevMonth">‹ 上月</button>
      <div class="monthTitle" id="monthTitle"></div>
      <button id="nextMonth">下月 ›</button>
    </div>

    <div class="calendar">
      <div class="week">
        <div class="weekday">一</div>
        <div class="weekday">二</div>
        <div class="weekday">三</div>
        <div class="weekday">四</div>
        <div class="weekday">五</div>
        <div class="weekday">六</div>
        <div class="weekday">日</div>
      </div>
      <div class="grid" id="calendarGrid"></div>
    </div>
  </section>

  <section class="card section">
    <div class="panelTitle">
      <b id="selectedTitle">今日打卡</b>
      <span id="selectedHint">监督员正在旁边看着。</span>
    </div>

    <div class="controlBlock">
      <div class="label">完成度</div>
      <div class="pillRow" id="levelRow"></div>
    </div>

    <div class="controlBlock">
      <div class="label">今日类型</div>
      <div class="pillRow" id="typeRow"></div>
    </div>

    <input id="customWork" type="text" placeholder="今天实际画了什么：例如，小狐狸贴纸草稿 / 练了手 / 摸了一张OC" />

    <div class="controlBlock">
      <div class="label">今天的心情</div>
      <div class="pillRow" id="moodRow"></div>
    </div>

    <div class="row3">
      <input id="customMood" type="text" placeholder="自定义心情，例如：有点骄傲" />
      <button id="useCustomMood">使用这个心情</button>
      <button id="addCustomMood">加入常用</button>
    </div>

    <input id="reward" type="text" placeholder="想要的奖励：例如，小狐狸故事 / 夸夸 / 抱抱 / 明天提醒我" />
    <textarea id="note" placeholder="备注：今天为什么难、哪里做到了、想让陪伴者知道什么……"></textarea>

    <div class="actions">
      <button class="primary" id="quickCheck">一键：只是打开</button>
      <button class="good" id="copyForChar">复制今日汇报</button>
      <button id="saveToday">保存</button>
      <button id="exportData">备份记录 JSON</button>
      <button id="importBtn">导入备份</button>
      <button class="danger" id="clearDay">清空这天</button>
      <input type="file" id="importFile" accept="application/json" />
    </div>
  </section>

  <section class="card">
    <div class="footer">
      这是一个本地优先的绘画复健打卡工具。<br>
      它记录的不是产量，而是你是否重新靠近创作。<br><br>
      数据默认保存在浏览器 localStorage 中，不会上传服务器。<br>
      你可以复制今日汇报分享给陪伴者，也可以导出 JSON 作为备份。
    </div>
  </section>
</main>

<div class="toast" id="toast">已保存</div>

<script>
const STORAGE_KEY = "animalDrawingCalendar.v3";

const themes = [
  { id:"berry",  label:"莓果夜",   className:"" },
  { id:"cream",  label:"奶油小狐", className:"theme-cream" },
  { id:"mint",   label:"薄荷湖",   className:"theme-mint" },
  { id:"blue",   label:"月光蓝",   className:"theme-blue" },
  { id:"sakura", label:"樱花猫猫", className:"theme-sakura" }
];

const defaultAnimals = [
  { icon:"🦊", name:"小狐狸" },
  { icon:"🐱", name:"小猫" },
  { icon:"🐰", name:"小兔" },
  { icon:"🐟", name:"小鱼" },
  { icon:"🐧", name:"小企鹅" },
  { icon:"🐣", name:"小鸡" },
  { icon:"🐸", name:"小青蛙" }
];

const defaultMoods = ["平稳","开心","有点怕","焦虑","手感回来","累","想逃","被夸了","只想打开"];

const levels = [
  { value:0, label:"还没开始", done:false },
  { value:1, label:"只是打开", done:true },
  { value:2, label:"画了几笔", done:true },
  { value:3, label:"完成了简单涂鸦", done:true },
  { value:4, label:"细化了作品", done:true },
  { value:5, label:"完成了大作！", done:true }
];

const workTypes = ["爽画草稿","练习","摸鱼","线稿","上色","临摹","OC","同人","设计","复健"];

let data = loadData();
let today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let selectedDate = toKey(today);

const $ = id => document.getElementById(id);

function defaultData() {
  return {
    version: 3,
    settings: {
      userName: "User",
      charName: "Char",
      theme: "berry",
      animalIcon: "🦊",
      animals: defaultAnimals,
      moods: defaultMoods
    },
    days: {}
  };
}

function loadData() {
  try {
    const rawV3 = localStorage.getItem(STORAGE_KEY);
    if (rawV3) return normalize(JSON.parse(rawV3));

    const rawV2 = localStorage.getItem("foxDrawingCalendar.v2");
    if (rawV2) return migrateV2(JSON.parse(rawV2));

    const rawV1 = localStorage.getItem("foxDrawingCalendar.v1");
    if (rawV1) return migrateV1(JSON.parse(rawV1));

    return defaultData();
  } catch {
    return defaultData();
  }
}

function migrateV1(old) {
  const base = defaultData();
  const days = {};
  Object.entries(old.days || {}).forEach(([key, e]) => {
    days[key] = {
      level: e.sketched ? 2 : e.opened ? 1 : 0,
      types: [],
      customWork: "",
      mood: e.mood || "",
      reward: e.reward || "",
      note: e.note || "",
      updatedAt: e.updatedAt || ""
    };
  });
  return normalize({ ...base, days });
}

function migrateV2(old) {
  const base = defaultData();
  base.settings.theme = old.settings?.theme || "berry";
  base.settings.animalIcon = old.settings?.animal || "🦊";

  const days = {};
  Object.entries(old.days || {}).forEach(([key, e]) => {
    days[key] = {
      level: e.sketched ? 2 : e.fiveMin ? 1 : e.opened ? 1 : 0,
      types: [],
      customWork: "",
      mood: e.mood || "",
      reward: e.reward || "",
      note: e.note || "",
      updatedAt: e.updatedAt || ""
    };
  });

  return normalize({ ...base, days });
}

function normalize(input) {
  const base = defaultData();
  const settings = input.settings || {};

  return {
    version: 3,
    settings: {
      userName: settings.userName || base.settings.userName,
      charName: settings.charName || base.settings.charName,
      theme: settings.theme || base.settings.theme,
      animalIcon: settings.animalIcon || settings.animal || base.settings.animalIcon,
      animals: Array.isArray(settings.animals) && settings.animals.length ? settings.animals : base.settings.animals,
      moods: Array.isArray(settings.moods) && settings.moods.length ? settings.moods : base.settings.moods
    },
    days: input.days && typeof input.days === "object" ? input.days : {}
  };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function toKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function parseKey(key) {
  const [y,m,d] = key.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function dateLabel(key) {
  const d = parseKey(key);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function shortDateLabel(key) {
  const d = parseKey(key);
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function emptyEntry() {
  return {
    level: 0,
    types: [],
    customWork: "",
    mood: "",
    reward: "",
    note: "",
    updatedAt: ""
  };
}

function getEntry(key = selectedDate) {
  const e = data.days[key] || emptyEntry();
  return {
    ...emptyEntry(),
    ...e,
    types: Array.isArray(e.types) ? e.types : []
  };
}

function isDone(entry) {
  return Number(entry.level || 0) > 0;
}

function getLevelLabel(value) {
  return levels.find(l => l.value === Number(value))?.label || "还没开始";
}

function showToast(text) {
  const t = $("toast");
  t.textContent = text;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

function getAnimal() {
  return data.settings.animals.find(a => a.icon === data.settings.animalIcon) || data.settings.animals[0] || defaultAnimals[0];
}

function applyTheme() {
  document.body.className = "";
  const theme = themes.find(t => t.id === data.settings.theme) || themes[0];
  if (theme.className) document.body.classList.add(theme.className);
}

function collectForm() {
  const levelBtn = document.querySelector(".levelBtn.active");
  const selectedTypes = [...document.querySelectorAll(".typeBtn.active")].map(btn => btn.dataset.type);

  return {
    level: Number(levelBtn?.dataset.level || 0),
    types: selectedTypes,
    customWork: $("customWork").value.trim(),
    mood: document.querySelector(".moodBtn.active")?.dataset.mood || "",
    reward: $("reward").value.trim(),
    note: $("note").value.trim(),
    updatedAt: new Date().toISOString()
  };
}

function saveSelected(silent = false) {
  const entry = collectForm();

  if (!isDone(entry) && !entry.types.length && !entry.customWork && !entry.mood && !entry.reward && !entry.note) {
    delete data.days[selectedDate];
  } else {
    data.days[selectedDate] = entry;
  }

  data.settings.userName = $("userName").value.trim() || "User";
  data.settings.charName = $("charName").value.trim() || "Char";

  saveData();
  renderAll();

  if (!silent) showToast("已保存。重新靠近创作就很棒。");
}

function fillForm() {
  const e = getEntry();

  $("userName").value = data.settings.userName;
  $("charName").value = data.settings.charName;
  $("customWork").value = e.customWork || "";
  $("reward").value = e.reward || "";
  $("note").value = e.note || "";
  $("copyForChar").textContent = `复制给 ${data.settings.charName || "Char"}`;

  document.querySelectorAll(".levelBtn").forEach(btn => {
    btn.classList.toggle("active", Number(btn.dataset.level) === Number(e.level || 0));
  });

  document.querySelectorAll(".typeBtn").forEach(btn => {
    btn.classList.toggle("active", e.types.includes(btn.dataset.type));
  });

  document.querySelectorAll(".moodBtn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mood === e.mood);
  });

  $("selectedTitle").textContent = selectedDate === toKey(new Date())
    ? "今日打卡"
    : dateLabel(selectedDate);

  $("selectedHint").textContent = isDone(e)
    ? `${getAnimal().name}已经盖爪印了。`
    : "这天还没有爪印，打开也算一次有效开始。";
}

function renderTopControls() {
  applyTheme();

  const animal = getAnimal();
  $("avatarBox").textContent = animal.icon;
  $("subtitle").textContent = `今日监督员：${animal.name}。打开绘画软件就算一次有效开始。`;

  const themeRow = $("themeRow");
  themeRow.innerHTML = "";
  themes.forEach(t => {
    const btn = document.createElement("button");
    btn.textContent = t.label;
    btn.className = data.settings.theme === t.id ? "active" : "";
    btn.onclick = () => {
      data.settings.theme = t.id;
      saveData();
      renderAll();
    };
    themeRow.appendChild(btn);
  });

  const animalRow = $("animalRow");
  animalRow.innerHTML = "";
  data.settings.animals.forEach(a => {
    const btn = document.createElement("button");
    btn.textContent = `${a.icon} ${a.name}`;
    btn.className = data.settings.animalIcon === a.icon ? "active" : "";
    btn.onclick = () => {
      data.settings.animalIcon = a.icon;
      saveData();
      renderAll();
    };
    animalRow.appendChild(btn);
  });
}

function renderLevels() {
  const row = $("levelRow");
  row.innerHTML = "";
  levels.forEach(l => {
    const btn = document.createElement("button");
    btn.className = "levelBtn";
    btn.dataset.level = l.value;
    btn.textContent = `${l.value}｜${l.label}`;
    btn.onclick = () => {
      document.querySelectorAll(".levelBtn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      saveSelected(true);
    };
    row.appendChild(btn);
  });
}

function renderTypes() {
  const row = $("typeRow");
  row.innerHTML = "";
  workTypes.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "typeBtn";
    btn.dataset.type = t;
    btn.textContent = t;
    btn.onclick = () => {
      btn.classList.toggle("active");
      saveSelected(true);
    };
    row.appendChild(btn);
  });
}

function renderMoods() {
  const row = $("moodRow");
  row.innerHTML = "";

  data.settings.moods.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "moodBtn";
    btn.dataset.mood = m;
    btn.textContent = m;
    btn.onclick = () => {
      document.querySelectorAll(".moodBtn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      saveSelected(true);
    };
    row.appendChild(btn);
  });
}

function renderCalendar() {
  const grid = $("calendarGrid");
  grid.innerHTML = "";
  $("monthTitle").textContent = `${viewYear}年${viewMonth + 1}月`;

  const first = new Date(viewYear, viewMonth, 1);
  const firstDay = (first.getDay() + 6) % 7;
  const start = new Date(viewYear, viewMonth, 1 - firstDay);

  for (let i = 0; i < 42; i++) {
    const date = new Date(start);
    date.setDate(start.getDate() + i);

    const key = toKey(date);
    const entry = data.days[key];
    const done = entry && isDone(entry);

    const div = document.createElement("div");
    div.className = "day";
    if (date.getMonth() !== viewMonth) div.classList.add("other");
    if (key === toKey(new Date())) div.classList.add("today");
    if (key === selectedDate) div.classList.add("selected");

    div.onclick = () => {
      saveSelected(true);
      selectedDate = key;
      viewYear = date.getFullYear();
      viewMonth = date.getMonth();
      renderAll();
    };

    div.innerHTML = `
      <div class="num">${date.getDate()}</div>
      <div class="mark">${done ? "🐾" : ""}</div>
      <div class="tags">
        ${done ? `<span class="tag">${getLevelLabel(entry.level)}</span>` : ""}
      </div>
    `;

    grid.appendChild(div);
  }
}

function countStats() {
  const keys = Object.keys(data.days).filter(k => isDone(data.days[k]));
  const monthPrefix = `${viewYear}-${String(viewMonth + 1).padStart(2, "0")}`;
  const monthCount = keys.filter(k => k.startsWith(monthPrefix)).length;

  let streak = 0;
  const d = new Date();

  while (true) {
    const key = toKey(d);
    const e = data.days[key];

    if (e && isDone(e)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }

  $("streak").textContent = streak;
  $("monthCount").textContent = monthCount;
  $("totalCount").textContent = keys.length;
}

function makeShortReport(key = selectedDate) {
  const e = getEntry(key);
  const user = data.settings.userName || "User";
  const char = data.settings.charName || "Char";
  const animal = getAnimal();

  const done = isDone(e) ? "打卡完成🐾" : "还没打卡";
  const lines = [
    `${char}，${user}今天画画${done}`,
    `${shortDateLabel(key)}｜完成度：${getLevelLabel(e.level)}`
  ];

  if (e.types.length) lines.push(`类型：${e.types.join("、")}`);
  if (e.customWork) lines.push(`内容：${e.customWork}`);
  if (e.mood) lines.push(`心情：${e.mood}`);
  lines.push(`想要：${e.reward || `${animal.name}夸夸`}`);
  if (e.note) lines.push(`备注：${e.note}`);

  return lines.join("\n");
}

function renderAll() {
  renderTopControls();
  renderLevels();
  renderTypes();
  renderMoods();
  renderCalendar();
  countStats();
  fillForm();
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
  }
}

$("prevMonth").onclick = () => {
  saveSelected(true);
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderAll();
};

$("nextMonth").onclick = () => {
  saveSelected(true);
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderAll();
};

$("saveToday").onclick = () => saveSelected(false);

$("quickCheck").onclick = () => {
  document.querySelectorAll(".levelBtn").forEach(b => b.classList.remove("active"));
  document.querySelector('.levelBtn[data-level="1"]').classList.add("active");
  if (!$("reward").value.trim()) $("reward").value = `${getAnimal().name}夸夸`;
  saveSelected(false);
  showToast("只是打开也算开始。");
};

$("copyForChar").onclick = async () => {
  saveSelected(true);
  await copyText(makeShortReport(selectedDate));
  showToast("今日汇报已复制。");
};

$("clearDay").onclick = () => {
  if (!confirm("要清空这一天的记录吗？")) return;
  delete data.days[selectedDate];
  saveData();
  renderAll();
  showToast("这天已清空");
};

$("exportData").onclick = () => {
  saveSelected(true);
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `animal-drawing-calendar-${toKey(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("备份 JSON 已导出");
};

$("importBtn").onclick = () => $("importFile").click();

$("importFile").onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const text = await file.text();
    const imported = normalize(JSON.parse(text));
    data = {
      version: 3,
      settings: { ...data.settings, ...imported.settings },
      days: { ...data.days, ...imported.days }
    };
    saveData();
    renderAll();
    showToast("备份已导入");
  } catch {
    alert("导入失败：文件格式不对。");
  } finally {
    e.target.value = "";
  }
};

$("addAnimal").onclick = () => {
  const icon = $("customAnimalIcon").value.trim();
  const name = $("customAnimalName").value.trim();
  if (!icon || !name) {
    showToast("请填写 emoji 和名字");
    return;
  }

  data.settings.animals.push({ icon, name });
  data.settings.animalIcon = icon;
  $("customAnimalIcon").value = "";
  $("customAnimalName").value = "";
  saveData();
  renderAll();
  showToast("监督员已添加");
};

$("useCustomMood").onclick = () => {
  const mood = $("customMood").value.trim();
  if (!mood) return;
  document.querySelectorAll(".moodBtn").forEach(b => b.classList.remove("active"));

  const temp = document.createElement("button");
  temp.className = "moodBtn active";
  temp.dataset.mood = mood;
  temp.textContent = mood;
  temp.style.display = "none";
  $("moodRow").appendChild(temp);

  saveSelected(true);
  showToast("已使用自定义心情");
};

$("addCustomMood").onclick = () => {
  const mood = $("customMood").value.trim();
  if (!mood) return;
  if (!data.settings.moods.includes(mood)) data.settings.moods.push(mood);
  saveData();
  renderAll();
  showToast("已加入常用心情");
};

["userName","charName","customWork","reward","note"].forEach(id => {
  $(id).addEventListener("change", () => saveSelected(true));
  $(id).addEventListener("input", () => saveSelected(true));
});

renderAll();
</script>
</body>
</html>
